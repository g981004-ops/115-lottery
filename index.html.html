                groupId: 12,
                advisor: "駱世民",
                order: 11,
                members: [
                    { id: "113212028", name: "鍾孟軒" },
                    { id: "113212029", name: "林寶寶" },
                    { id: "113212030", name: "莫鵬飛" },
                    { id: "113212040", name: "楊金寶" },
                    { id: "113212042", name: "林家有" },
                    { id: "112212049", name: "李承和" }
                ]
            }
        ];

        let currentActiveView = 'group';

        // 2. 初始化渲染頁面
        window.addEventListener('DOMContentLoaded', () => {
            renderGroupView();
            renderOrderView();
            renderAdvisorView();
        });

        // 3. 渲染依組別排列視圖
        function renderGroupView(filteredData = lotteryData) {
            const container = document.getElementById('group-grid');
            container.innerHTML = '';
            
            // 按組別排序 1-12
            const sorted = [...filteredData].sort((a, b) => a.groupId - b.groupId);
            
            sorted.forEach(group => {
                const card = document.createElement('div');
                card.className = "bg-white dark:bg-academic-darkcard rounded-xl border border-slate-100 dark:border-slate-800 p-6 shadow-sm hover:shadow-lg transition-all duration-300 hover:-translate-y-1 relative overflow-hidden flex flex-col justify-between cursor-pointer card";
                card.onclick = () => openDetails(group.groupId);
                
                card.innerHTML = `
                    <div>
                        <!-- 頂部與指導老師 -->
                        <div class="flex items-center justify-between mb-4">
                            <span class="text-xs font-mono font-bold text-academic-gold bg-amber-50 dark:bg-amber-950/40 px-2.5 py-1 rounded-md border border-academic-gold/20">GROUP ${group.groupId}</span>
                            <span class="text-sm font-bold text-slate-700 dark:text-slate-200">
                                指導老師：<span class="text-academic-navy dark:text-academic-gold text-base">${group.advisor}</span>
                            </span>
                        </div>
                        
                        <!-- 標題與簡介 -->
                        <h3 class="text-xl font-bold text-slate-800 dark:text-white mb-2 academic-serif flex items-center gap-1.5">
                            第 ${group.groupId} 組專題小組
                        </h3>
                        
                        <!-- 學生名單摘要 -->
                        <div class="mt-4 pt-4 border-t border-slate-100 dark:border-slate-800/80">
                            <span class="text-xs font-semibold text-slate-400 block mb-2">組員名單 (${group.members.length}人)：</span>
                            <div class="flex flex-wrap gap-1.5">
                                ${group.members.map(member => `
                                    <span class="text-xs bg-slate-50 dark:bg-slate-800 px-2 py-1 rounded border border-slate-100 dark:border-slate-700 font-mono text-slate-600 dark:text-slate-300">
                                        ${member.name}
                                    </span>
                                `).join('')}
                            </div>
                        </div>
                    </div>

                    <!-- 報告發表順序徽章 -->
                    <div class="mt-6 pt-3 border-t border-dashed border-slate-100 dark:border-slate-800 flex items-center justify-between">
                        <span class="text-xs text-slate-400">專題競賽發表</span>
                        <span class="text-xs font-bold text-slate-700 dark:text-slate-300 flex items-center gap-1">
                            報告順序：
                            <span class="text-sm text-academic-gold font-black font-mono">第 ${group.order} 順位</span>
                        </span>
                    </div>
                `;
                container.appendChild(card);
            });
            toggleNoResults(filteredData.length === 0);
        }

        // 4. 渲染發表時間軸視圖 (依報告順序排序)
        function renderOrderView(filteredData = lotteryData) {
            const container = document.getElementById('order-timeline');
            container.innerHTML = '';

            // 按報告順序排序 1-12
            const sorted = [...filteredData].sort((a, b) => a.order - b.order);

            sorted.forEach((group, index) => {
                const timelineNode = document.createElement('div');
                timelineNode.className = "relative flex flex-col md:flex-row md:items-start gap-4 md:gap-8 group cursor-pointer transition-all hover:pl-2";
                timelineNode.onclick = () => openDetails(group.groupId);

                timelineNode.innerHTML = `
                    <!-- 圓點指標與順序號 -->
                    <div class="absolute -left-[53px] md:-left-[61px] top-1.5 flex items-center justify-center w-8 h-8 rounded-full bg-white dark:bg-academic-darkcard border-2 border-academic-gold shadow-sm group-hover:scale-110 transition-all">
                        <span class="text-sm font-black font-mono text-academic-navy dark:text-academic-gold">${group.order}</span>
                    </div>

                    <!-- 報告卡片區 -->
                    <div class="flex-1 bg-white dark:bg-academic-darkcard rounded-xl p-5 md:p-6 border border-slate-100 dark:border-slate-800 shadow-sm hover:shadow-md transition-all">
                        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-4">
                            <div>
                                <span class="text-xs font-mono text-slate-400">PRESENTATION ORDER ${group.order}</span>
                                <h4 class="text-lg font-bold text-slate-800 dark:text-white academic-serif mt-0.5">
                                    第 ${group.groupId} 專題小組 (第 ${group.order} 發表順位)
                                </h4>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="text-xs bg-blue-50 dark:bg-slate-800 text-academic-navy dark:text-academic-gold font-bold px-3 py-1 rounded-md border border-blue-100 dark:border-slate-700">
                                    指導：${group.advisor} 教授
                                </span>
                            </div>
                        </div>

                        <!-- 人員清單 -->
                        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-2 pt-4 border-t border-slate-100 dark:border-slate-800/80">
                            ${group.members.map(member => `
                                <div class="bg-slate-50 dark:bg-slate-800 p-2 rounded border border-slate-100 dark:border-slate-700 flex flex-col">
                                    <span class="text-xs font-semibold text-slate-800 dark:text-slate-200">${member.name}</span>
                                    <span class="text-[10px] font-mono text-slate-400 mt-0.5">${member.id}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                container.appendChild(timelineNode);
            });
            toggleNoResults(filteredData.length === 0);
        }

        // 5. 渲染依教授分群視圖
        function renderAdvisorView(filteredData = lotteryData) {
            const container = document.getElementById('view-advisor');
            container.innerHTML = '';

            // 計算每位教授對應的組別群
            const professors = ["胡毓彬", "林欣美", "駱世民", "莊文彬", "吳淑貞", "許文忠"];
            
            professors.forEach(prof => {
                const groupsUnderProf = filteredData.filter(g => g.advisor === prof);
                
                // 如果目前篩選下這位教授沒有任何組別，且是在有篩選的情況下，就不呈現
                if (groupsUnderProf.length === 0) return;

                const profSection = document.createElement('div');
                profSection.className = "bg-white dark:bg-academic-darkcard rounded-2xl p-6 md:p-8 border border-slate-100 dark:border-slate-800 shadow-sm";
                
                profSection.innerHTML = `
                    <div class="flex items-center justify-between border-b-2 border-academic-gold pb-4 mb-6">
                        <div class="flex items-center gap-3">
                            <div class="w-2.5 h-6 bg-academic-navy dark:bg-academic-gold rounded-full"></div>
                            <h3 class="text-xl md:text-2xl font-black text-slate-800 dark:text-white academic-serif">${prof} 教授指導群</h3>
                        </div>
                        <span class="text-xs bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-300 font-bold px-3 py-1.5 rounded-full">
                            共 ${groupsUnderProf.length} 組
                        </span>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        ${groupsUnderProf.map(g => `
                            <div onclick="openDetails(${g.groupId})" class="bg-slate-50 dark:bg-slate-800/40 border border-slate-100 dark:border-slate-800 hover:border-academic-gold rounded-xl p-5 cursor-pointer hover:shadow-sm transition-all">
                                <div class="flex items-center justify-between mb-3">
                                    <span class="text-sm font-bold text-academic-navy dark:text-academic-gold font-mono">第 ${g.groupId} 組</span>
                                    <span class="text-xs bg-amber-50 dark:bg-amber-950/30 text-academic-gold font-bold px-2 py-0.5 rounded border border-academic-gold/10">報告順序: ${g.order}</span>
                                </div>
                                <div class="space-y-2 mt-4">
                                    <span class="text-xs text-slate-400 block font-semibold">專題成員：</span>
                                    <div class="flex flex-wrap gap-1.5">
                                        ${g.members.map(m => `
                                            <span class="text-xs bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 text-slate-600 dark:text-slate-300 px-2 py-1 rounded">
                                                ${m.name} (${m.id})
                                            </span>
                                        `).join('')}
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(profSection);
            });
            
            // 如果全部空
            const hasAnyData = professors.some(prof => filteredData.filter(g => g.advisor === prof).length > 0);
            toggleNoResults(!hasAnyData);
        }

        // 6. 視圖即時切換邏輯
        function switchView(viewType) {
            currentActiveView = viewType;
            
            // 隱藏全部視圖
            document.querySelectorAll('.view-content').forEach(el => {
                el.classList.add('hidden');
                el.classList.remove('active');
            });

            // 呈現當前選擇視圖
            const activeEl = document.getElementById(`view-${viewType}`);
            activeEl.classList.remove('hidden');
            activeEl.classList.add('active');

            // 更新按鈕聚焦樣式
            const buttons = ['group', 'order', 'advisor'];
            buttons.forEach(btn => {
                const el = document.getElementById(`tab-${btn}`);
                if (btn === viewType) {
                    el.className = "px-4 py-2 text-xs sm:text-sm font-bold rounded-lg transition-all text-slate-700 dark:text-slate-300 bg-white dark:bg-slate-700 shadow-sm";
                } else {
                    el.className = "px-4 py-2 text-xs sm:text-sm font-bold rounded-lg transition-all text-slate-500 dark:text-slate-400 hover:text-slate-700";
                }
            });

            // 即時配合當前的搜尋與過濾值渲染
            executeSearchAndFilter();
        }

        // 7. 即時搜尋與篩選引擎
        function executeSearchAndFilter() {
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            const profSelected = document.getElementById('advisorFilter').value;

            let results = [...lotteryData];

            // 處理下拉選單過濾教授
            if (profSelected !== 'all') {
                results = results.filter(g => g.advisor === profSelected);
            }

            // 處理搜尋關鍵字
            if (query) {
                results = results.filter(group => {
                    const matchGroupNum = `第${group.groupId}組`.includes(query) || group.groupId.toString() === query;
                    const matchAdvisor = group.advisor.toLowerCase().includes(query);
                    const matchOrder = `順序${group.order}`.includes(query) || `第${group.order}順位`.includes(query);
                    const matchMembers = group.members.some(m => 
                        m.name.toLowerCase().includes(query) || m.id.includes(query)
                    );
                    return matchGroupNum || matchAdvisor || matchOrder || matchMembers;
                });
            }

            // 依目前的視角重新渲染資料
            if (currentActiveView === 'group') {
                renderGroupView(results);
            } else if (currentActiveView === 'order') {
                renderOrderView(results);
            } else if (currentActiveView === 'advisor') {
                renderAdvisorView(results);
            }
        }

        // 監聽器
        function handleSearch() {
            executeSearchAndFilter();
        }

        function handleFilter() {
            executeSearchAndFilter();
        }

        // 快速過濾器 (後台保留邏輯以支援重置)
        function resetFilters() {
            document.getElementById('advisorFilter').value = 'all';
            document.getElementById('searchInput').value = '';
            executeSearchAndFilter();
        }

        function toggleNoResults(show) {
            const el = document.getElementById('no-results');
            if (show) {
                el.classList.remove('hidden');
            } else {
                el.classList.add('hidden');
            }
        }

        // 8. 專題組別詳細卡片彈出式 Modal
        function openDetails(groupId) {
            const group = lotteryData.find(g => g.groupId === groupId);
            if (!group) return;

            const modal = document.getElementById('detailsModal');
            const content = document.getElementById('modalContent');

            content.innerHTML = `
                <div class="text-center sm:text-left">
                    <div class="flex items-center justify-between border-b border-slate-100 dark:border-slate-800 pb-4 mb-5">
                        <h3 class="text-2xl font-black text-academic-navy dark:text-academic-gold academic-serif" id="modal-title">
                            第 ${group.groupId} 專題小組詳情
                        </h3>
                        <span class="text-xs bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-300 font-bold px-3 py-1 rounded-md">
                            GROUP ID: ${group.groupId}
                        </span>
                    </div>

                    <!-- 雙欄資訊呈現 -->
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div class="bg-slate-50 dark:bg-slate-800 p-4 rounded-xl border border-slate-100 dark:border-slate-800">
                            <span class="text-xs text-slate-400 block">學術指導教授</span>
                            <span class="text-lg font-bold text-slate-800 dark:text-white">${group.advisor} 教授</span>
                        </div>
                        <div class="bg-amber-50/50 dark:bg-amber-950/20 p-4 rounded-xl border border-academic-gold/10">
                            <span class="text-xs text-academic-gold block">競賽發表報告順序</span>
                            <span class="text-lg font-bold text-academic-navy dark:text-academic-gold font-mono">第 ${group.order} 順位</span>
                        </div>
                    </div>

                    <!-- 成員詳細表格 -->
                    <div class="space-y-3">
                        <span class="text-sm font-bold text-slate-700 dark:text-slate-300 block">專題研究組員清單</span>
                        <div class="border border-slate-100 dark:border-slate-800 rounded-xl overflow-hidden">
                            <table class="min-w-full divide-y divide-slate-100 dark:divide-slate-800 text-left text-sm">
                                <thead class="bg-slate-50 dark:bg-slate-800/80">
                                    <tr>
                                        <th class="px-4 py-3 text-slate-400 font-semibold">#</th>
                                        <th class="px-4 py-3 text-slate-400 font-semibold">學號 (Student ID)</th>
                                        <th class="px-4 py-3 text-slate-400 font-semibold">姓名 (Name)</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-100 dark:divide-slate-800 dark:text-slate-200">
                                    ${group.members.map((m, idx) => `
                                        <tr class="hover:bg-slate-50/50 dark:hover:bg-slate-800/50">
                                            <td class="px-4 py-3 text-slate-400">${idx + 1}</td>
                                            <td class="px-4 py-3 font-mono">${m.id}</td>
                                            <td class="px-4 py-3 font-semibold">${m.name}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;

            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('detailsModal');
            modal.classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // 9. 暗色模式切換 (Dark Mode Control)
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            const themeIcon = document.getElementById('themeIcon');
            
            if (isDark) {
                localStorage.setItem('theme', 'dark');
                themeIcon.innerHTML = `<path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>`;
                themeIcon.className = "w-5 h-5 text-indigo-400";
            } else {
                localStorage.setItem('theme', 'light');
                themeIcon.innerHTML = `<path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"></path>`;
                themeIcon.className = "w-5 h-5 text-amber-500";
            }
        }

        // 初始化暗色模式偏好
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            const themeIcon = document.getElementById('themeIcon');
            themeIcon.innerHTML = `<path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>`;
            themeIcon.className = "w-5 h-5 text-indigo-400";
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
</body>
</html>
